# Copy to ~/.config/tutti/config.toml or pass with --config.
# This file intentionally calls existing harness CLIs instead of implementing model APIs.

default_agents = ["codex", "claude", "gemini", "qwen", "kimi"]
timeout_seconds = 1800
workspace_mode = "copy"
capture_diff = true
max_output_chars = 0

[agents.codex]
label = "Codex CLI"
command = [
  "codex",
  "exec",
  "--skip-git-repo-check",
  "--sandbox",
  "workspace-write",
  "--cd",
  "{workspace}",
  "-"
]
stdin = "{prompt}"

[agents.claude]
label = "Claude Code"
command = [
  "claude",
  "--print",
  "--permission-mode",
  "acceptEdits",
  "--no-session-persistence"
]
stdin = "{prompt}"

[agents.gemini]
label = "Gemini CLI"
command = [
  "gemini",
  "--approval-mode",
  "auto_edit",
  "{prompt}"
]

[agents.qwen]
label = "Qwen Code"
command = [
  "qwen",
  "--approval-mode",
  "auto-edit",
  "--output-format",
  "text",
  "{prompt}"
]

[agents.kimi]
label = "Kimi CLI"
command = [
  "kimi",
  "--work-dir",
  "{workspace}",
  "--print",
  "--input-format",
  "text",
  "--output-format",
  "text"
]
stdin = "{prompt}"

# Example: a custom wrapper around an MCP-backed bridge.
