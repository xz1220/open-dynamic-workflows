# Copy to ./agentswarm.toml, ~/.config/agentswarm/config.toml, or pass --config.
#
# agent-swarm never calls model APIs directly. Each adapter is a local CLI it
# shells out to. The five below ship as built-ins, so you only need a config
# file to change defaults, tune flags, or add your own adapter.

# Which adapter agent() uses when a workflow does not name one.
default_adapter = "claude"

# Run-wide settings (all optional; defaults shown).
concurrency = 8          # max agent CLIs running at once (omit for auto)
max_agents = 1000        # hard cap on total dispatches per run (runaway guard)
workspace_mode = "copy"  # "copy" (isolated + diff) or "inplace" (read-only / fast)
timeout = 1800           # per-agent CLI timeout in seconds
schema_retries = 2       # extra attempts when a schema fails to validate
# runs_root = "~/.agentswarm/runs"

[adapters.codex]
label = "Codex CLI"
command = ["codex", "exec", "--skip-git-repo-check", "--sandbox", "workspace-write", "--cd", "{workspace}", "-"]
stdin = "{prompt}"

[adapters.claude]
label = "Claude Code"
command = ["claude", "--print", "--permission-mode", "acceptEdits", "--no-session-persistence"]
stdin = "{prompt}"

[adapters.gemini]
label = "Gemini CLI"
command = ["gemini", "--approval-mode", "auto_edit", "{prompt}"]

[adapters.qwen]
label = "Qwen Code"
command = ["qwen", "--approval-mode", "auto-edit", "--output-format", "text", "{prompt}"]

[adapters.kimi]
label = "Kimi CLI"
command = ["kimi", "--work-dir", "{workspace}", "--print", "--input-format", "text", "--output-format", "text"]
stdin = "{prompt}"

# A custom adapter: any command works as long as it reads a prompt and prints a reply.
# [adapters.my_wrapper]
# label = "My MCP wrapper"
# command = ["my-agent-wrapper", "--cwd", "{workspace}", "--prompt-file", "{prompt_file}"]
