<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Open Dynamic Workflows 动态拓扑原型</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #ffffff;
        --ink: #111111;
        --muted: #707070;
        --line: #e8e8e8;
        --soft-line: #f3f3f3;
        --node-border: #d7d7d7;
        --node-active: #111111;
        --green: #10b981;
        --grid: rgba(0, 0, 0, 0.035);
        --sans: "Inter", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --soft: "Gaegu", cursive;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        overflow: hidden;
        background: var(--bg);
        color: var(--ink);
        font-family: var(--sans);
        -webkit-font-smoothing: antialiased;
      }

      button {
        font: inherit;
      }

      .page {
        min-height: 100dvh;
        display: grid;
        grid-template-columns: 332px minmax(0, 1fr);
        gap: 0;
        background: #ffffff;
      }

      .sidebar {
        min-height: 100dvh;
        padding: 34px 28px;
        border-right: 1px solid var(--line);
        display: flex;
        flex-direction: column;
      }

      .brand {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 18px;
        margin-bottom: 64px;
      }

      .brand-name {
        max-width: 230px;
        font-family: var(--soft);
        font-size: 33px;
        font-weight: 700;
        line-height: 0.88;
        letter-spacing: 0;
      }

      .live-pill {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 0;
        background: transparent;
        color: #666666;
        font-size: 12px;
        white-space: nowrap;
      }

      .live-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--green);
        box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4);
        animation: pulse 1.8s infinite;
      }

      .done-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #b9b9b9;
      }

      .section-label {
        color: var(--muted);
        font-size: 12px;
        margin-bottom: 12px;
      }

      .flow-group + .flow-group {
        margin-top: 28px;
      }

      .flow-list {
        display: grid;
        gap: 12px;
      }

      .flow {
        width: 100%;
        border: 1px solid var(--line);
        background: #ffffff;
        border-radius: 12px;
        padding: 14px 14px 13px;
        cursor: pointer;
        text-align: left;
        transition:
          transform 0.2s ease,
          border-color 0.2s ease,
          box-shadow 0.2s ease;
      }

      .flow:hover {
        transform: translateY(-2px);
      }

      .flow.done {
        cursor: default;
        background: #fcfcfc;
      }

      .flow.done:hover {
        transform: none;
      }

      .flow.active {
        border-color: #111111;
        box-shadow: rgba(0, 0, 0, 0.04) 0 10px 24px;
      }

      .flow-title {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        font-size: 16px;
        font-weight: 700;
      }

      .flow-meta {
        margin-top: 8px;
        color: var(--muted);
        font-size: 13px;
      }

      .flow-strip {
        display: block;
        margin-top: 14px;
        height: 6px;
        overflow: hidden;
        border-radius: 999px;
        background: #eeeeee;
      }

      .flow-strip span {
        display: block;
        height: 100%;
      }

      .strip-progress {
        background: #111111;
        opacity: 0.72;
      }

      .summary {
        margin-top: auto;
        padding-top: 28px;
      }

      .summary-row {
        display: flex;
        justify-content: space-between;
        border-top: 1px solid var(--soft-line);
        padding-top: 12px;
        color: var(--muted);
        font-size: 13px;
      }

      .summary-row strong {
        color: var(--ink);
      }

      .stage {
        position: relative;
        min-height: 100dvh;
        overflow: hidden;
        background:
          linear-gradient(var(--grid) 1px, transparent 1px),
          linear-gradient(90deg, var(--grid) 1px, transparent 1px),
          #ffffff;
        background-size: 36px 36px;
      }

      .topology {
        position: absolute;
        inset: 42px 40px 78px;
      }

      .wires {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      .wire {
        fill: none;
        stroke: #111111;
        stroke-width: 1.1;
        stroke-linecap: round;
        stroke-dasharray: 7 12;
        opacity: 0.2;
        animation: move-wire 6s linear infinite;
      }

      .topo-node {
        position: absolute;
        z-index: 2;
        width: 118px;
        min-height: 58px;
        border: 1px solid var(--node-border);
        border-radius: 8px;
        padding: 11px 12px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: rgba(0, 0, 0, 0.035) 0 10px 24px;
        transition:
          transform 0.24s ease,
          box-shadow 0.24s ease;
      }

      .topo-node:hover {
        transform: translateY(-3px);
        border-color: var(--node-active);
        box-shadow: rgba(0, 0, 0, 0.07) 0 16px 34px;
      }

      .topo-node.running::after {
        content: "";
        position: absolute;
        top: 14px;
        right: 12px;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--green);
        box-shadow: 0 0 0 5px rgba(16, 185, 129, 0.08);
      }

      .topo-node h2 {
        margin: 0;
        padding-right: 14px;
        font-size: 14px;
        line-height: 1.2;
      }

      .topo-node p {
        margin: 7px 0 0;
        color: #666666;
        font-size: 11px;
        line-height: 1.35;
      }

      .node-question {
        left: 5%;
        top: 46%;
      }

      .node-plan {
        left: 22%;
        top: 46%;
      }

      .node-dispatch {
        left: 39%;
        top: 46%;
        border-color: var(--node-active);
      }

      .node-a {
        left: 58%;
        top: 18%;
      }

      .node-b {
        left: 58%;
        top: 46%;
      }

      .node-c {
        left: 58%;
        top: 74%;
      }

      .node-merge {
        right: 5%;
        top: 46%;
      }

      .floating-dot {
        position: absolute;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #eeeeee;
        animation: drift 5s ease-in-out infinite;
      }

      .dot-a {
        left: 48%;
        top: 17%;
      }

      .dot-b {
        left: 9%;
        bottom: 9%;
        animation-delay: 0.8s;
      }

      .dot-c {
        right: 7%;
        top: 24%;
        animation-delay: 1.4s;
      }

      .footer-status {
        position: absolute;
        left: 40px;
        right: 40px;
        bottom: 30px;
        z-index: 4;
        color: var(--muted);
        font-size: 13px;
      }

      @keyframes pulse {
        0% {
          box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.38);
        }
        70% {
          box-shadow: 0 0 0 10px rgba(16, 185, 129, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(16, 185, 129, 0);
        }
      }

      @keyframes move-wire {
        to {
          stroke-dashoffset: -76;
        }
      }

      @keyframes drift {
        0%,
        100% {
          transform: translate(0, 0);
          opacity: 0.55;
        }
        50% {
          transform: translate(14px, -18px);
          opacity: 1;
        }
      }

      @media (max-width: 1020px) {
        body {
          overflow: auto;
        }

        .page {
          grid-template-columns: 1fr;
          padding: 18px;
        }

        .sidebar,
        .stage {
          min-height: auto;
        }

        .stage {
          height: 760px;
        }
      }

      @media (max-width: 720px) {
        .footer-status {
          left: 18px;
          right: 18px;
        }

        .topology {
          inset: 58px 18px 86px;
        }

        .topo-node {
          width: 128px;
          min-height: 76px;
          padding: 13px;
        }

        .topo-node h2 {
          font-size: 15px;
        }

        .topo-node p {
          font-size: 12px;
        }

        .node-question {
          left: 0;
          top: 42%;
        }

        .node-plan {
          left: 22%;
          top: 42%;
        }

        .node-dispatch {
          left: 44%;
          top: 42%;
        }

        .node-a,
        .node-b,
        .node-c {
          left: 44%;
        }

        .node-merge {
          right: 0;
          top: 42%;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-name">Open Dynamic Workflows</div>
          <div class="live-pill"><span class="live-dot"></span>运行中</div>
        </div>

        <div class="flow-group">
          <div class="section-label">运行中</div>
          <div class="flow-list" id="runningList"></div>
        </div>

        <div class="flow-group">
          <div class="section-label">已完成</div>
          <div class="flow-list" id="doneList"></div>
        </div>

        <div class="summary" id="summary"></div>
      </aside>

      <section class="stage" aria-label="工作流拓扑画布">
        <div class="topology">
          <svg class="wires" viewBox="0 0 1000 560" preserveAspectRatio="none" aria-hidden="true">
            <path class="wire" d="M160 288 C200 288, 220 288, 260 288"></path>
            <path class="wire" d="M350 288 C382 288, 402 288, 432 288"></path>
            <path class="wire" d="M522 288 C565 210, 595 175, 646 170"></path>
            <path class="wire" d="M522 288 C568 288, 598 288, 646 288"></path>
            <path class="wire" d="M522 288 C565 368, 595 408, 646 418"></path>
            <path class="wire" d="M720 170 C790 195, 812 250, 850 288"></path>
            <path class="wire" d="M720 288 C770 288, 805 288, 850 288"></path>
            <path class="wire" d="M720 418 C790 390, 812 326, 850 288"></path>
          </svg>

          <article class="topo-node node-question">
            <h2 id="nodeOneTitle">接收问题</h2>
            <p id="nodeOneCopy">已启动</p>
          </article>

          <article class="topo-node node-plan">
            <h2 id="nodeTwoTitle">规划角度</h2>
            <p id="nodeTwoCopy">5 条路径</p>
          </article>

          <article class="topo-node node-dispatch">
            <h2 id="nodeThreeTitle">派发节点</h2>
            <p id="nodeThreeCopy">等待返回</p>
          </article>

          <article class="topo-node node-a">
            <h2 id="nodeFourTitle">研究节点 A</h2>
            <p id="nodeFourCopy">运行中</p>
          </article>

          <article class="topo-node node-b">
            <h2 id="nodeFiveTitle">研究节点 B</h2>
            <p id="nodeFiveCopy">运行中</p>
          </article>

          <article class="topo-node node-c">
            <h2 id="nodeSixTitle">验证节点</h2>
            <p id="nodeSixCopy">排队中</p>
          </article>

          <article class="topo-node node-merge">
            <h2 id="nodeSevenTitle">汇合结果</h2>
            <p id="nodeSevenCopy">62%</p>
          </article>

          <div class="floating-dot dot-a"></div>
          <div class="floating-dot dot-b"></div>
          <div class="floating-dot dot-c"></div>
        </div>

        <div class="footer-status">
          <div id="footerText">12 个节点活跃，5 个节点已完成。</div>
        </div>
      </section>
    </main>

    <script>
      const runningFlows = [
        {
          title: "深度研究工作流",
          meta: "5 个阶段 · 17 个节点 · 62%",
          progress: 62,
          nodes: [
            ["接收问题", "已启动"],
            ["规划角度", "5 条路径"],
            ["派发节点", "等待返回"],
            ["研究节点 A", "运行中"],
            ["研究节点 B", "运行中"],
            ["验证节点", "排队中"],
            ["汇合结果", "62%"],
          ],
          footer: "12 个节点活跃，5 个节点已完成。",
        },
        {
          title: "迁移审查工作流",
          meta: "4 个阶段 · 9 个节点 · 48%",
          progress: 48,
          nodes: [
            ["确定范围", "已启动"],
            ["拆分风险", "3 条路径"],
            ["派发节点", "等待返回"],
            ["结构审查", "运行中"],
            ["数据审查", "运行中"],
            ["权限审查", "排队中"],
            ["生成结论", "48%"],
          ],
          footer: "6 个节点活跃，3 个节点已完成。",
        },
        {
          title: "发布检查工作流",
          meta: "3 个阶段 · 6 个节点 · 71%",
          progress: 71,
          nodes: [
            ["读取变更", "已启动"],
            ["规划检查", "4 条路径"],
            ["派发节点", "等待返回"],
            ["测试节点", "已完成"],
            ["文档节点", "运行中"],
            ["风险节点", "运行中"],
            ["发布摘要", "71%"],
          ],
          footer: "2 个节点活跃，4 个节点已完成。",
        },
      ];

      const completedFlows = [
        {
          title: "依赖审计工作流",
          meta: "2 个阶段 · 5 个节点",
        },
        {
          title: "文档同步工作流",
          meta: "3 个阶段 · 8 个节点",
        },
      ];

      let active = 0;

      const nodeIds = [
        ["nodeOneTitle", "nodeOneCopy"],
        ["nodeTwoTitle", "nodeTwoCopy"],
        ["nodeThreeTitle", "nodeThreeCopy"],
        ["nodeFourTitle", "nodeFourCopy"],
        ["nodeFiveTitle", "nodeFiveCopy"],
        ["nodeSixTitle", "nodeSixCopy"],
        ["nodeSevenTitle", "nodeSevenCopy"],
      ];

      function isRunningState(state) {
        return !state.includes("已完成") && !state.includes("排队") && !state.includes("%");
      }

      function renderList() {
        const runningList = document.getElementById("runningList");
        runningList.innerHTML = runningFlows
          .map(
            (flow, index) => `
              <button class="flow ${index === active ? "active" : ""}" type="button" data-index="${index}">
                <div class="flow-title">
                  <span>${flow.title}</span>
                  <span class="live-pill"><span class="live-dot"></span>运行</span>
                </div>
                <div class="flow-meta">${flow.meta}</div>
                <div class="flow-strip"><span class="strip-progress" style="width:${flow.progress}%"></span></div>
              </button>
            `,
          )
          .join("");

        runningList.querySelectorAll(".flow").forEach((button) => {
          button.addEventListener("click", () => {
            active = Number(button.dataset.index);
            render();
          });
        });

        const doneList = document.getElementById("doneList");
        doneList.innerHTML = completedFlows
          .map(
            (flow) => `
              <div class="flow done">
                <div class="flow-title">
                  <span>${flow.title}</span>
                  <span class="live-pill"><span class="done-dot"></span>完成</span>
                </div>
                <div class="flow-meta">${flow.meta}</div>
              </div>
            `,
          )
          .join("");
      }

      function renderStage() {
        const flow = runningFlows[active];
        document.getElementById("footerText").textContent = flow.footer;

        nodeIds.forEach(([titleId, copyId], index) => {
          const title = document.getElementById(titleId);
          const copy = document.getElementById(copyId);
          const state = flow.nodes[index][1];

          title.textContent = flow.nodes[index][0];
          copy.textContent = state;
          title.closest(".topo-node").classList.toggle("running", isRunningState(state));
        });

        document.getElementById("summary").innerHTML = `
          <div class="summary-row"><span>运行中</span><strong>${runningFlows.length}</strong></div>
          <div class="summary-row"><span>已完成</span><strong>${completedFlows.length}</strong></div>
        `;
      }

      function render() {
        renderList();
        renderStage();
      }

      render();
    </script>
  </body>
</html>
