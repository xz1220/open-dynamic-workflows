<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Open Dynamic Workflows 动态拓扑原型</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #ffffff;
        --ink: #111111;
        --muted: #777777;
        --line: #ececec;
        --soft-line: #f5f5f5;
        --mint: #d7f1e1;
        --peach: #ffe8d6;
        --sky: #e0f2fe;
        --lilac: #f3e8ff;
        --cream: #fff8dd;
        --green: #10b981;
        --shadow: rgba(0, 0, 0, 0.06) 0 20px 60px;
        --radius: 32px;
        --sans: "Inter", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --soft: "Gaegu", cursive;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        overflow: hidden;
        background: var(--bg);
        color: var(--ink);
        font-family: var(--sans);
        -webkit-font-smoothing: antialiased;
      }

      button {
        font: inherit;
      }

      .page {
        min-height: 100dvh;
        padding: 34px;
        display: grid;
        grid-template-columns: 340px minmax(0, 1fr);
        gap: 26px;
      }

      .sidebar,
      .stage {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        background: #ffffff;
      }

      .sidebar {
        min-height: calc(100dvh - 68px);
        padding: 26px 24px;
        display: flex;
        flex-direction: column;
      }

      .brand {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 18px;
        margin-bottom: 70px;
      }

      .brand-name {
        max-width: 230px;
        font-family: var(--soft);
        font-size: 33px;
        font-weight: 700;
        line-height: 0.88;
        letter-spacing: 0;
      }

      .live-pill {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 0;
        background: transparent;
        color: #666666;
        font-size: 12px;
        white-space: nowrap;
      }

      .live-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--green);
        box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4);
        animation: pulse 1.8s infinite;
      }

      .section-label {
        color: var(--muted);
        font-size: 12px;
        margin-bottom: 12px;
      }

      .flow-list {
        display: grid;
        gap: 12px;
      }

      .flow {
        width: 100%;
        border: 1px solid var(--line);
        background: #ffffff;
        border-radius: 20px;
        padding: 16px;
        cursor: pointer;
        text-align: left;
        transition:
          transform 0.2s ease,
          border-color 0.2s ease,
          box-shadow 0.2s ease;
      }

      .flow:hover {
        transform: translateY(-2px);
      }

      .flow.active {
        border-color: #111111;
        box-shadow: rgba(0, 0, 0, 0.08) 0 12px 30px;
      }

      .flow-title {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        font-size: 16px;
        font-weight: 700;
      }

      .flow-meta {
        margin-top: 8px;
        color: var(--muted);
        font-size: 13px;
      }

      .flow-strip {
        display: flex;
        margin-top: 14px;
        height: 10px;
        overflow: hidden;
        border-radius: 999px;
        background: #f2f2f2;
      }

      .flow-strip span {
        display: block;
        height: 100%;
      }

      .strip-mint {
        background: var(--mint);
      }

      .strip-peach {
        background: var(--peach);
      }

      .strip-sky {
        background: var(--sky);
      }

      .strip-lilac {
        background: var(--lilac);
      }

      .summary {
        margin-top: auto;
        padding-top: 28px;
      }

      .summary-row {
        display: flex;
        justify-content: space-between;
        border-top: 1px solid var(--soft-line);
        padding-top: 12px;
        color: var(--muted);
        font-size: 13px;
      }

      .summary-row strong {
        color: var(--ink);
      }

      .stage {
        position: relative;
        min-height: calc(100dvh - 68px);
        overflow: hidden;
      }

      .stage-header {
        position: absolute;
        top: 32px;
        left: 36px;
        right: 36px;
        z-index: 4;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 24px;
      }

      .stage-title {
        font-size: 15px;
        font-weight: 700;
      }

      .stage-hint {
        color: var(--muted);
        font-size: 13px;
      }

      .topology {
        position: absolute;
        inset: 96px 34px 78px;
      }

      .wires {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      .wire {
        fill: none;
        stroke: #111111;
        stroke-width: 1.35;
        stroke-linecap: round;
        stroke-dasharray: 7 12;
        opacity: 0.18;
        animation: move-wire 6s linear infinite;
      }

      .topo-node {
        position: absolute;
        z-index: 2;
        width: 150px;
        min-height: 88px;
        border: 1px solid rgba(0, 0, 0, 0.04);
        border-radius: 18px;
        padding: 16px;
        box-shadow: rgba(0, 0, 0, 0.05) 0 18px 45px;
        transition:
          transform 0.24s ease,
          box-shadow 0.24s ease;
      }

      .topo-node:hover {
        transform: translateY(-3px);
        box-shadow: rgba(0, 0, 0, 0.08) 0 24px 55px;
      }

      .topo-node.running::after {
        content: "";
        position: absolute;
        top: 14px;
        right: 14px;
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--green);
        box-shadow: 0 0 0 7px rgba(16, 185, 129, 0.1);
      }

      .topo-node h2 {
        margin: 0;
        font-size: 17px;
        line-height: 1.2;
      }

      .topo-node p {
        margin: 10px 0 0;
        color: #666666;
        font-size: 13px;
        line-height: 1.35;
      }

      .node-question {
        left: 2%;
        top: 43%;
        background: var(--sky);
      }

      .node-plan {
        left: 21%;
        top: 43%;
        background: var(--peach);
      }

      .node-dispatch {
        left: 40%;
        top: 43%;
        background: #ffffff;
        border-color: var(--line);
      }

      .node-a {
        left: 59%;
        top: 12%;
        background: var(--mint);
      }

      .node-b {
        left: 59%;
        top: 43%;
        background: var(--cream);
      }

      .node-c {
        left: 59%;
        top: 74%;
        background: var(--sky);
      }

      .node-merge {
        right: 2%;
        top: 43%;
        background: var(--lilac);
      }

      .floating-dot {
        position: absolute;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #eeeeee;
        animation: drift 5s ease-in-out infinite;
      }

      .dot-a {
        left: 48%;
        top: 17%;
      }

      .dot-b {
        left: 9%;
        bottom: 9%;
        animation-delay: 0.8s;
      }

      .dot-c {
        right: 7%;
        top: 24%;
        animation-delay: 1.4s;
      }

      .footer-status {
        position: absolute;
        left: 36px;
        right: 36px;
        bottom: 28px;
        z-index: 4;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 18px;
        color: var(--muted);
        font-size: 13px;
      }

      .soft-button {
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        background: #111111;
        color: #ffffff;
        font-weight: 700;
        cursor: pointer;
        box-shadow: rgba(0, 0, 0, 0.12) 0 12px 26px;
      }

      @keyframes pulse {
        0% {
          box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.38);
        }
        70% {
          box-shadow: 0 0 0 10px rgba(16, 185, 129, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(16, 185, 129, 0);
        }
      }

      @keyframes move-wire {
        to {
          stroke-dashoffset: -76;
        }
      }

      @keyframes drift {
        0%,
        100% {
          transform: translate(0, 0);
          opacity: 0.55;
        }
        50% {
          transform: translate(14px, -18px);
          opacity: 1;
        }
      }

      @media (max-width: 1020px) {
        body {
          overflow: auto;
        }

        .page {
          grid-template-columns: 1fr;
          padding: 18px;
        }

        .sidebar,
        .stage {
          min-height: auto;
        }

        .stage {
          height: 760px;
        }
      }

      @media (max-width: 720px) {
        .stage-header,
        .footer-status {
          left: 18px;
          right: 18px;
        }

        .stage-header {
          align-items: flex-start;
          flex-direction: column;
        }

        .topology {
          inset: 120px 18px 86px;
        }

        .topo-node {
          width: 128px;
          min-height: 76px;
          padding: 13px;
        }

        .topo-node h2 {
          font-size: 15px;
        }

        .topo-node p {
          font-size: 12px;
        }

        .node-question {
          left: 0;
          top: 42%;
        }

        .node-plan {
          left: 22%;
          top: 42%;
        }

        .node-dispatch {
          left: 44%;
          top: 42%;
        }

        .node-a,
        .node-b,
        .node-c {
          left: 44%;
        }

        .node-merge {
          right: 0;
          top: 42%;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-name">Open Dynamic Workflows</div>
          <div class="live-pill"><span class="live-dot"></span>运行中</div>
        </div>

        <div class="section-label">正在运行的动态工作流</div>
        <div class="flow-list" id="flowList"></div>

        <div class="summary" id="summary"></div>
      </aside>

      <section class="stage" aria-label="动态工作流拓扑">
        <div class="stage-header">
          <div class="stage-title">动态工作流拓扑</div>
          <div class="stage-hint" id="stageHint">从一个问题开始</div>
        </div>

        <div class="topology">
          <svg class="wires" viewBox="0 0 1000 620" preserveAspectRatio="none" aria-hidden="true">
            <path class="wire" d="M118 310 C175 310, 210 310, 268 310"></path>
            <path class="wire" d="M330 310 C392 310, 420 310, 482 310"></path>
            <path class="wire" d="M545 310 C590 190, 630 155, 705 150"></path>
            <path class="wire" d="M545 310 C610 310, 640 310, 705 310"></path>
            <path class="wire" d="M545 310 C590 430, 630 465, 705 470"></path>
            <path class="wire" d="M780 150 C845 190, 840 265, 884 310"></path>
            <path class="wire" d="M780 310 C822 310, 842 310, 884 310"></path>
            <path class="wire" d="M780 470 C845 430, 840 355, 884 310"></path>
          </svg>

          <article class="topo-node node-question running">
            <h2 id="nodeOneTitle">接收问题</h2>
            <p id="nodeOneCopy">已启动</p>
          </article>

          <article class="topo-node node-plan running">
            <h2 id="nodeTwoTitle">规划角度</h2>
            <p id="nodeTwoCopy">5 条路径</p>
          </article>

          <article class="topo-node node-dispatch running">
            <h2 id="nodeThreeTitle">派发节点</h2>
            <p id="nodeThreeCopy">等待返回</p>
          </article>

          <article class="topo-node node-a running">
            <h2 id="nodeFourTitle">研究节点 A</h2>
            <p id="nodeFourCopy">运行中</p>
          </article>

          <article class="topo-node node-b running">
            <h2 id="nodeFiveTitle">研究节点 B</h2>
            <p id="nodeFiveCopy">运行中</p>
          </article>

          <article class="topo-node node-c">
            <h2 id="nodeSixTitle">验证节点</h2>
            <p id="nodeSixCopy">排队中</p>
          </article>

          <article class="topo-node node-merge">
            <h2 id="nodeSevenTitle">汇合结果</h2>
            <p id="nodeSevenCopy">62%</p>
          </article>

          <div class="floating-dot dot-a"></div>
          <div class="floating-dot dot-b"></div>
          <div class="floating-dot dot-c"></div>
        </div>

        <div class="footer-status">
          <div id="footerText">12 个节点活跃，5 个节点已完成。</div>
          <button class="soft-button" type="button" id="shuffleButton">切换工作流</button>
        </div>
      </section>
    </main>

    <script>
      const flows = [
        {
          title: "深度研究工作流",
          meta: "5 个阶段 · 17 个节点 · 62%",
          colors: [42, 28, 20, 10],
          hint: "从一个问题开始",
          nodes: [
            ["接收问题", "已启动"],
            ["规划角度", "5 条路径"],
            ["派发节点", "等待返回"],
            ["研究节点 A", "运行中"],
            ["研究节点 B", "运行中"],
            ["验证节点", "排队中"],
            ["汇合结果", "62%"],
          ],
          footer: "12 个节点活跃，5 个节点已完成。",
        },
        {
          title: "迁移审查工作流",
          meta: "4 个阶段 · 9 个节点 · 48%",
          colors: [30, 34, 18, 8],
          hint: "从迁移范围开始",
          nodes: [
            ["确定范围", "已启动"],
            ["拆分风险", "3 条路径"],
            ["派发节点", "等待返回"],
            ["结构审查", "运行中"],
            ["数据审查", "运行中"],
            ["权限审查", "排队中"],
            ["生成结论", "48%"],
          ],
          footer: "6 个节点活跃，3 个节点已完成。",
        },
        {
          title: "发布检查工作流",
          meta: "3 个阶段 · 6 个节点 · 71%",
          colors: [22, 18, 38, 12],
          hint: "从变更读取开始",
          nodes: [
            ["读取变更", "已启动"],
            ["规划检查", "4 条路径"],
            ["派发节点", "等待返回"],
            ["测试节点", "已完成"],
            ["文档节点", "运行中"],
            ["风险节点", "运行中"],
            ["发布摘要", "71%"],
          ],
          footer: "2 个节点活跃，4 个节点已完成。",
        },
      ];

      let active = 0;

      const nodeIds = [
        ["nodeOneTitle", "nodeOneCopy"],
        ["nodeTwoTitle", "nodeTwoCopy"],
        ["nodeThreeTitle", "nodeThreeCopy"],
        ["nodeFourTitle", "nodeFourCopy"],
        ["nodeFiveTitle", "nodeFiveCopy"],
        ["nodeSixTitle", "nodeSixCopy"],
        ["nodeSevenTitle", "nodeSevenCopy"],
      ];

      function renderList() {
        const list = document.getElementById("flowList");
        list.innerHTML = flows
          .map(
            (flow, index) => `
              <button class="flow ${index === active ? "active" : ""}" type="button" data-index="${index}">
                <div class="flow-title">
                  <span>${flow.title}</span>
                  <span class="live-pill"><span class="live-dot"></span>运行</span>
                </div>
                <div class="flow-meta">${flow.meta}</div>
                <div class="flow-strip">
                  <span class="strip-mint" style="width:${flow.colors[0]}%"></span>
                  <span class="strip-peach" style="width:${flow.colors[1]}%"></span>
                  <span class="strip-sky" style="width:${flow.colors[2]}%"></span>
                  <span class="strip-lilac" style="width:${flow.colors[3]}%"></span>
                </div>
              </button>
            `,
          )
          .join("");

        list.querySelectorAll(".flow").forEach((button) => {
          button.addEventListener("click", () => {
            active = Number(button.dataset.index);
            render();
          });
        });
      }

      function renderStage() {
        const flow = flows[active];
        document.getElementById("stageHint").textContent = flow.hint;
        document.getElementById("footerText").textContent = flow.footer;

        nodeIds.forEach(([titleId, copyId], index) => {
          document.getElementById(titleId).textContent = flow.nodes[index][0];
          document.getElementById(copyId).textContent = flow.nodes[index][1];
        });

        document.getElementById("summary").innerHTML = `
          <div class="summary-row"><span>运行中</span><strong>${flows.length}</strong></div>
        `;
      }

      function render() {
        renderList();
        renderStage();
      }

      document.getElementById("shuffleButton").addEventListener("click", () => {
        active = (active + 1) % flows.length;
        render();
      });

      render();
    </script>
  </body>
</html>
