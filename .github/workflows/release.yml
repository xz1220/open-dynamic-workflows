name: release

# Build a self-contained `odw` binary for every platform and attach them to the
# GitHub Release. SEA injects the blob into the *host's* node binary, so there is
# no cross-compiling — each target is built on its own runner.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

# Run all JavaScript actions on Node 24 (the Node 20 action runtime is deprecated).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  binary:
    name: ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        # No darwin-x64: GitHub's Intel macOS runners (macos-13) are being retired
        # and queue indefinitely. Intel-mac users install via npm (see install.sh).
        include:
          - { runner: macos-14,         os: darwin, arch: arm64 }
          - { runner: ubuntu-latest,    os: linux,  arch: x64 }
          - { runner: ubuntu-24.04-arm, os: linux,  arch: arm64 }
          - { runner: windows-latest,   os: win,    arch: x64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm ci
      - run: npm run build:binary
      - name: Name + compress the artifact
        shell: bash
        run: |
          # The binary is ~110 MB (almost entirely the embedded Node runtime);
          # gzip -9 cuts the *download* to ~30–40 MB on every platform. gzip is
          # lossless, so the macOS code signature survives the round-trip.
          ext=""; [ "${{ matrix.os }}" = "win" ] && ext=".exe"
          bin="odw-${{ matrix.os }}-${{ matrix.arch }}$ext"
          mv "build/odw$ext" "$bin"
          gzip -9 "$bin"
          echo "ASSET=$bin.gz" >> "$GITHUB_ENV"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET }}
          path: ${{ env.ASSET }}
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
